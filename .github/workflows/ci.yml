name: CI

on: [push]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Add conda to system path
      run: |
        # $CONDA is an environment variable pointing to the root of the 
        # miniconda directory
        echo $CONDA/bin >> $GITHUB_PATH
    - name: Install dependencies
      run: |
        # Strip the pip section from environment.yml so conda
        # does not try to build wheels in isolation.  The pip
        # packages are installed in the next step with
        # --no-build-isolation.
        sed '/^  - pip:/,/^  [^ ]/{ /^  - pip:/d; /^    -/d; }' \
          environment.yml > environment_ci.yml
        conda env update --file environment_ci.yml --name base
    - name: Install git pip packages
      run: |
        conda run -n base pip install --no-build-isolation \
          git+https://github.com/courtk32/FIRE_studio.git
        conda run -n base pip install --no-build-isolation \
          git+https://github.com/courtk32/mockobservation-tools.git
        conda run -n base pip install --no-build-isolation \
          git+https://github.com/Bullock-Group-UC-Irvine/shared-analysis-tools.git
    - name: Lint with flake8
      run: |
        conda install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 
        # chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Install gallearn
      run: |
        pip install .
    - name: Test with pytest
      env:
        GALLEARN_CONFIG: .github/config_ci.ini
      run: |
        pytest
